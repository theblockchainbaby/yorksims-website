<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" fill="#0a0a0a" rx="12"/>
  
  <!-- Shopping bag -->
  <g transform="translate(64, 64)">
    <!-- Bag handles -->
    <path d="M -12 -20 Q -12 -30 0 -30 Q 12 -30 12 -20" 
          fill="none" stroke="#ec4899" stroke-width="2.5" opacity="0.9"/>
    
    <!-- Bag body -->
    <path d="M -18 -18 L -15 20 Q -15 25 -10 25 L 10 25 Q 15 25 15 20 L 18 -18 Z" 
          fill="none" stroke="#ec4899" stroke-width="2.5" opacity="0.9"/>
    
    <!-- Bag fold line -->
    <line x1="-18" y1="-10" x2="18" y2="-10" stroke="#ec4899" stroke-width="1.5" opacity="0.6"/>
    
    <!-- Items in bag -->
    <rect x="-12" y="-5" width="8" height="12" fill="#ec4899" opacity="0.5" rx="1"/>
    <rect x="4" y="-5" width="8" height="12" fill="#ec4899" opacity="0.5" rx="1"/>
    
    <!-- Price tag -->
    <circle cx="12" cy="-15" r="6" fill="#f472b6" opacity="0.8"/>
    <text x="12" y="-11" text-anchor="middle" fill="#0a0a0a" font-size="8" font-weight="bold" opacity="0.9">$</text>
  </g>
</svg>

