<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" fill="#0a0a0a" rx="12"/>

  <!-- Payment/Wallet with dual currency -->
  <g transform="translate(64, 64)">
    <!-- Wallet/Card body -->
    <rect x="-28" y="-18" width="56" height="36" fill="none" stroke="#00d9ff" stroke-width="2.5" rx="4" opacity="0.95"/>

    <!-- Card chip -->
    <rect x="-20" y="-12" width="12" height="12" fill="none" stroke="#00d9ff" stroke-width="1.5" opacity="0.7"/>
    <line x1="-18" y1="-10" x2="-14" y2="-10" stroke="#00d9ff" stroke-width="1" opacity="0.6"/>
    <line x1="-18" y1="-6" x2="-14" y2="-6" stroke="#00d9ff" stroke-width="1" opacity="0.6"/>
    <line x1="-18" y1="-2" x2="-14" y2="-2" stroke="#00d9ff" stroke-width="1" opacity="0.6"/>

    <!-- Dollar sign (left) -->
    <text x="-8" y="6" font-size="20" font-weight="bold" fill="#23f0c6" opacity="0.9" text-anchor="middle">$</text>

    <!-- Bitcoin/Crypto symbol (right) -->
    <text x="12" y="6" font-size="18" font-weight="bold" fill="#00ff88" opacity="0.9" text-anchor="middle">₿</text>

    <!-- Magnetic stripe -->
    <rect x="-26" y="12" width="52" height="8" fill="#00d9ff" opacity="0.3"/>
    <line x1="-26" y1="14" x2="26" y2="14" stroke="#00d9ff" stroke-width="0.5" opacity="0.5"/>
    <line x1="-26" y1="16" x2="26" y2="16" stroke="#00d9ff" stroke-width="0.5" opacity="0.5"/>
    <line x1="-26" y1="18" x2="26" y2="18" stroke="#00d9ff" stroke-width="0.5" opacity="0.5"/>
  </g>
</svg>

