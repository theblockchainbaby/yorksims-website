<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" fill="#0a0a0a" rx="12"/>

  <!-- Crown outline style -->
  <g transform="translate(64, 64)">
    <!-- Crown band -->
    <path d="M -28 10 L -28 20 Q -28 24 -24 24 L 24 24 Q 28 24 28 20 L 28 10"
          fill="none" stroke="#84cc16" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

    <!-- Left point -->
    <line x1="-20" y1="10" x2="-24" y2="-12" stroke="#84cc16" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <circle cx="-24" cy="-12" r="3" fill="none" stroke="#84cc16" stroke-width="2" opacity="0.9"/>

    <!-- Center point (tallest) -->
    <line x1="0" y1="10" x2="0" y2="-22" stroke="#84cc16" stroke-width="2.5" stroke-linecap="round" opacity="1"/>
    <circle cx="0" cy="-22" r="4" fill="#22c55e" opacity="0.9"/>
    <circle cx="0" cy="-22" r="4" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>

    <!-- Right point -->
    <line x1="20" y1="10" x2="24" y2="-12" stroke="#84cc16" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <circle cx="24" cy="-12" r="3" fill="none" stroke="#84cc16" stroke-width="2" opacity="0.9"/>
  </g>
</svg>

