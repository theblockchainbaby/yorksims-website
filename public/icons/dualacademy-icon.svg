<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" fill="#0a0a0a" rx="12"/>

  <!-- Graduation cap and book -->
  <g transform="translate(64, 64)">
    <!-- Graduation cap top (mortarboard) -->
    <path d="M -28 -8 L -28 -6 L 28 -6 L 28 -8 Z" fill="#fbbf24" opacity="0.9"/>
    <path d="M -28 -8 L 0 -22 L 28 -8 Z" fill="#fbbf24" opacity="0.95"/>

    <!-- Cap border -->
    <ellipse cx="0" cy="-6" rx="28" ry="4" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.8"/>

    <!-- Tassel -->
    <line x1="0" y1="-6" x2="0" y2="8" stroke="#fbbf24" stroke-width="2.5" opacity="0.85"/>
    <circle cx="0" cy="10" r="3.5" fill="#fbbf24" opacity="0.9"/>

    <!-- Book below cap -->
    <rect x="-24" y="12" width="48" height="28" fill="none" stroke="#fbbf24" stroke-width="2.5" rx="2" opacity="0.95"/>

    <!-- Book spine -->
    <line x1="-1" y1="12" x2="-1" y2="40" stroke="#f59e0b" stroke-width="2" opacity="0.8"/>

    <!-- Book pages/lines -->
    <line x1="-20" y1="18" x2="18" y2="18" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
    <line x1="-20" y1="24" x2="18" y2="24" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
    <line x1="-20" y1="30" x2="18" y2="30" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
    <line x1="-20" y1="36" x2="18" y2="36" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
  </g>
</svg>

