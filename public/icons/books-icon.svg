<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" fill="#0a0a0a" rx="12"/>

  <!-- Open book outline style -->
  <g transform="translate(64, 64)">
    <!-- Left page -->
    <path d="M -26 -20 L -6 -20 L -6 20 L -26 20 Z"
          fill="none" stroke="#23f0c6" stroke-width="2.5" stroke-linejoin="round" opacity="0.95"/>

    <!-- Right page -->
    <path d="M 6 -20 L 26 -20 L 26 20 L 6 20 Z"
          fill="none" stroke="#00ff88" stroke-width="2.5" stroke-linejoin="round" opacity="0.95"/>

    <!-- Spine/binding -->
    <line x1="-6" y1="-20" x2="-6" y2="20" stroke="#00d9ff" stroke-width="2" opacity="0.8"/>
    <line x1="6" y1="-20" x2="6" y2="20" stroke="#00d9ff" stroke-width="2" opacity="0.8"/>

    <!-- Left page text lines -->
    <line x1="-22" y1="-12" x2="-10" y2="-12" stroke="#23f0c6" stroke-width="1.5" opacity="0.6"/>
    <line x1="-22" y1="-6" x2="-10" y2="-6" stroke="#23f0c6" stroke-width="1.5" opacity="0.6"/>
    <line x1="-22" y1="0" x2="-10" y2="0" stroke="#23f0c6" stroke-width="1.5" opacity="0.6"/>
    <line x1="-22" y1="6" x2="-10" y2="6" stroke="#23f0c6" stroke-width="1.5" opacity="0.6"/>
    <line x1="-22" y1="12" x2="-10" y2="12" stroke="#23f0c6" stroke-width="1.5" opacity="0.6"/>

    <!-- Right page text lines -->
    <line x1="10" y1="-12" x2="22" y2="-12" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="-6" x2="22" y2="-6" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="0" x2="22" y2="0" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="6" x2="22" y2="6" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>
    <line x1="10" y1="12" x2="22" y2="12" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>
  </g>
</svg>

